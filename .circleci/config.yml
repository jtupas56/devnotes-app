version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:22.0.0

    steps:
      - checkout

      - run:
          name: Activate pnpm
          command: |
            corepack prepare pnpm@11.9.0 --activate

      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile