version: 2.1
jobs:
  build:
    docker:
      - image: cimg/node:22.0.0
    steps:
      - checkout
      - run:
          name: Enable Corepack & Update pnpm
          command: |
            corepack enable
            corepack prepare pnpm@latest --activate
      - run:
          name: Install Dependencies
          command: pnpm install --frozen-lockfile
