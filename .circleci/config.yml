version: 2.1

jobs:
  build-and-check:
    docker:
      - image: cimg/node:22.13.0   # ✅ change this to Node 22+
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: |
            npm install --global corepack@latest
            corepack enable
            corepack prepare pnpm@latest-11 --activate
      - run:
          name: Install dependencies
          command: pnpm install
      - run:
          name: Lint
          command: pnpm lint
      - run:
          name: Build
          command: pnpm build
      - store_artifacts:
          path: .next

workflows:
  verify:
    jobs:
      - build-and-check